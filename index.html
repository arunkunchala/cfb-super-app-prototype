<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0B0C13">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CFB Super App">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<title>CFB Super App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Graduate&family=Big+Shoulders+Display:wght@600;700;800&family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============ DESIGN TOKENS ============ */
:root{
  --bg:#0B0C13; --surface:#151724; --surface2:#1D2032; --line:#2A2E45;
  --ink:#FFFFFF; --mut:#98A0B4; --dim:#5C6478;
  --gold:#F5B400; --gold2:#FFD866; --green:#2FBF71; --red:#E4572E; --live:#FF3B30;
  /* team theme (default: Ohio State) */
  --team:#C9302C; --team-dk:#8E1F1C; --team-glow:rgba(201,48,44,.35);
  --team2:#B0B7C3; --on-team:#FFFFFF;
  --grad-team:linear-gradient(115deg,var(--team) 0%,var(--team-dk) 100%);
  --grad-gold:linear-gradient(115deg,#FFD866,#F5B400 55%,#C98F00);
  --varsity:'Graduate',serif; --display:'Big Shoulders Display','Oswald',sans-serif;
  --score:'Oswald',sans-serif; --body:'Inter',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:#08080C;font-family:var(--body);color:var(--ink);overflow:hidden}
body::before{content:"";position:fixed;inset:0;
  background:repeating-linear-gradient(90deg,transparent 0 119px,rgba(255,255,255,.018) 119px 121px);pointer-events:none}

/* ============ STAGE / DESKTOP CHROME ============ */
.stage{display:flex;height:100vh;align-items:center;justify-content:center;gap:36px;padding:20px}
.side{width:250px;max-height:92vh;overflow-y:auto;scrollbar-width:thin;flex:none}
.side h1{font-family:var(--varsity);font-size:17px;color:var(--gold);letter-spacing:1px;line-height:1.35}
.side .sub{font-size:11px;color:var(--dim);margin:6px 0 16px;line-height:1.5}
.side .grp{font-family:var(--score);font-size:10.5px;font-weight:600;letter-spacing:2.5px;color:var(--dim);margin:14px 0 6px;text-transform:uppercase}
.side a{display:block;font-size:12.5px;color:var(--mut);text-decoration:none;padding:5px 10px;border-radius:7px;cursor:pointer}
.side a:hover{background:#15161F;color:#fff}
.side a.on{background:#1C1E2B;color:var(--gold);font-weight:600}
@media(max-width:900px){.side{display:none}.stage{padding:0}}

/* ============ PHONE ============ */
.phone{width:390px;height:844px;max-height:96vh;background:var(--bg);border-radius:44px;
  box-shadow:0 0 0 10px #16161c,0 0 0 12px #2a2a33,0 40px 90px rgba(0,0,0,.7),0 0 140px -30px var(--team-glow);
  position:relative;overflow:hidden;flex:none}
@media(max-width:440px){.phone{width:100vw;height:100vh;max-height:100vh;border-radius:0;box-shadow:none}}
.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:120px;height:26px;background:#000;border-radius:14px;z-index:60}
.status{position:absolute;top:14px;left:26px;right:26px;display:flex;justify-content:space-between;font-size:12px;font-weight:700;z-index:55;pointer-events:none}
.status .r{color:var(--mut);font-weight:500}

/* ============ SCREENS ============ */
.screen{position:absolute;inset:0;padding:52px 0 86px;overflow-y:auto;overflow-x:hidden;
  background:
    radial-gradient(140% 50% at 50% -10%, rgba(255,255,255,.045), transparent 60%),
    repeating-linear-gradient(90deg, transparent 0 77px, rgba(255,255,255,.016) 77px 78px),
    var(--bg);
  display:none;scrollbar-width:none}
.screen::-webkit-scrollbar{display:none}
.screen.on{display:block;animation:in .22s ease}
@keyframes in{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:none}}
.screen.back-anim{animation:inL .22s ease}
@keyframes inL{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:none}}
.pad{padding:0 18px}

/* headers — hero banner (game UI) */
.hero{position:relative;margin:4px 0 12px;padding:16px 18px 20px;overflow:hidden;
  background:
    radial-gradient(130% 160% at 88% -30%, var(--team-glow), transparent 55%),
    linear-gradient(115deg, var(--team-dk) 0%, rgba(0,0,0,0) 62%),
    linear-gradient(180deg, #171927, #12131e);
  border-bottom:1px solid var(--line);
  clip-path:polygon(0 0,100% 0,100% calc(100% - 14px),0 100%)}
.hero::before{content:"";position:absolute;top:-10px;right:-22px;width:150px;height:170%;
  background:repeating-linear-gradient(115deg, rgba(255,255,255,.05) 0 10px, transparent 10px 34px);
  transform:skewX(-12deg);pointer-events:none}
.hero .kick{display:inline-block;font-family:var(--score);font-size:10.5px;font-weight:700;letter-spacing:3px;
  color:#171200;text-transform:uppercase;background:var(--grad-gold);padding:4px 12px;
  transform:skewX(-8deg);box-shadow:2px 2px 0 rgba(0,0,0,.45)}
.hero h2{font-family:var(--display);font-size:40px;font-weight:800;text-transform:uppercase;
  letter-spacing:.5px;line-height:.92;margin-top:11px;font-style:italic;
  text-shadow:3px 3px 0 rgba(0,0,0,.45), 0 0 34px var(--team-glow)}
.hero .sub{font-size:11.5px;color:var(--mut);margin-top:8px;font-weight:500}
.subhdr{display:flex;align-items:center;gap:11px;padding:10px 18px 8px}
.back{width:36px;height:36px;background:var(--surface2);border:1px solid var(--line);transform:skewX(-8deg);
  display:flex;align-items:center;justify-content:center;font-size:17px;color:#fff;cursor:pointer;flex:none;
  box-shadow:2px 2px 0 rgba(0,0,0,.4)}
.subhdr .t{font-family:var(--display);font-size:23px;font-weight:800;text-transform:uppercase;font-style:italic;letter-spacing:.5px}
.subhdr .s{font-size:10.5px;color:var(--mut);margin-top:0}

/* pennant strip — CFB flavor on hub headers */
.pennants{display:flex;gap:6px;padding:10px 0 0}
.pennants i{width:0;height:0;border-left:11px solid var(--team);border-top:8px solid transparent;border-bottom:8px solid transparent;filter:drop-shadow(1px 1px 0 rgba(0,0,0,.4))}
.pennants i:nth-child(2n){border-left-color:var(--gold)}
.pennants i:nth-child(3n){border-left-color:var(--team2);opacity:.6}

/* field texture band — turf + yard lines */
.field{background:
  repeating-linear-gradient(90deg, transparent 0 30px, rgba(255,255,255,.07) 30px 32px),
  repeating-linear-gradient(0deg, rgba(255,255,255,.03) 0 12px, transparent 12px 24px),
  linear-gradient(160deg,#155232 0%, #0E3B22 55%, #0B2E1B 100%)!important;
  border:1px solid #237848!important;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.1), 0 0 26px -10px rgba(47,191,113,.5)!important}

/* cards & rows — notched game panels */
.card{background:linear-gradient(100deg,#191C2C,#141625 65%);border:1px solid var(--line);border-radius:4px;
  padding:14px;margin:0 18px 11px;position:relative;
  clip-path:polygon(0 0,calc(100% - 16px) 0,100% 16px,100% 100%,0 100%);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 6px 16px -8px rgba(0,0,0,.6)}
.card::before{content:"";position:absolute;top:0;left:0;width:100%;height:2px;
  background:linear-gradient(90deg,var(--line),transparent 60%)}
.card.hi{background:
    radial-gradient(120% 150% at 90% -30%, var(--team-glow), transparent 55%),
    linear-gradient(100deg,#1C1F31,#151726 70%);
  border-color:var(--team)}
.card.hi::before{background:var(--grad-team);height:3px}
.card.hi::after{content:"";position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(105deg,transparent 42%,rgba(255,255,255,.09) 50%,transparent 58%);
  background-size:260% 100%;animation:sheen 3.4s ease-in-out infinite}
@keyframes sheen{0%{background-position:130% 0}55%{background-position:-70% 0}100%{background-position:-70% 0}}
.card .k{font-family:var(--score);font-size:10px;font-weight:700;letter-spacing:2.4px;color:var(--mut);text-transform:uppercase;display:flex;align-items:center;gap:7px}
.card .k::before{content:"";width:13px;height:8px;background:var(--team);transform:skewX(-22deg);flex:none;box-shadow:1px 1px 0 rgba(0,0,0,.4)}
.card .k.team{color:var(--team2)} .card .k.gold{color:var(--gold)} .card .k.gold::before{background:var(--grad-gold)}
.card .k.red{color:var(--red)} .card .k.red::before{background:var(--red)}
.card .k.green{color:var(--green)} .card .k.green::before{background:var(--green)}
.card h3{font-family:var(--score);font-size:16.5px;font-weight:600;margin-top:5px;letter-spacing:.2px}
.card p{font-size:11.5px;color:var(--mut);margin-top:4px;line-height:1.45}
.tap{cursor:pointer;transition:transform .08s}
.tap:active{transform:scale(.98)}
.arrow{position:absolute;right:13px;top:50%;transform:translateY(-50%) skewX(-10deg);color:var(--gold);font-size:18px;font-weight:800}

/* list rows */
.rowi{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
.rowi:last-child{border-bottom:none}
.rowi .grow{flex:1;min-width:0}
.rowi .t{font-size:13px;font-weight:700}
.rowi .s{font-size:10.5px;color:var(--mut);margin-top:1px}

/* avatars / crests */
.av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--score);font-weight:700;font-size:13px;flex:none;border:2px solid rgba(255,255,255,.2);
  box-shadow:0 3px 8px rgba(0,0,0,.5), inset 0 2px 3px rgba(255,255,255,.18)}
.av.sm{width:30px;height:30px;font-size:10.5px}
.av.lg{width:52px;height:52px;font-size:17px}

/* chips & buttons */
.chip{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;background:var(--surface2);
  border:1px solid var(--line);font-family:var(--score);font-size:10.5px;font-weight:600;letter-spacing:1px;color:var(--mut);
  cursor:pointer;white-space:nowrap;transform:skewX(-8deg);text-transform:uppercase;box-shadow:2px 2px 0 rgba(0,0,0,.35)}
.chip.on{background:var(--grad-team);border-color:var(--team);color:var(--on-team)}
.chip.gold{background:rgba(245,180,0,.12);border-color:rgba(245,180,0,.5);color:var(--gold)}
.chiprow{display:flex;gap:9px;padding:8px 18px 10px;overflow-x:auto;scrollbar-width:none}
.chiprow::-webkit-scrollbar{display:none}
.btn{display:block;width:calc(100% - 36px);margin:10px 18px;padding:14px;border:none;
  background:var(--grad-team);color:var(--on-team);font-family:var(--score);font-size:14.5px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;cursor:pointer;text-align:center;transition:transform .07s, box-shadow .07s;
  transform:skewX(-8deg);font-style:italic;
  box-shadow:0 4px 0 rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.2), 0 0 26px -8px var(--team-glow)}
.btn:active{transform:skewX(-8deg) translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.5)}
.btn.gold{background:var(--grad-gold);color:#171200;box-shadow:0 4px 0 rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.5), 0 0 28px -6px rgba(245,180,0,.5)}
.btn.ghost{background:var(--surface2);color:#fff;border:1px solid var(--line);box-shadow:0 4px 0 rgba(0,0,0,.4)}
.btn.inline{display:inline-block;width:auto;margin:0;padding:9px 18px;font-size:11.5px}
.btn:disabled{opacity:.45;cursor:default}

/* progress — striped XP bars */
.bar{height:11px;background:#0A0B12;overflow:hidden;transform:skewX(-8deg);border:1px solid var(--line);box-shadow:inset 0 2px 4px rgba(0,0,0,.6)}
.bar i{display:block;height:100%;background:
    repeating-linear-gradient(-55deg, rgba(255,255,255,.22) 0 5px, transparent 5px 12px),
    var(--grad-gold);
  transition:width .5s ease;animation:march 1.6s linear infinite;background-size:24px 100%, 100% 100%}
@keyframes march{to{background-position:24px 0, 0 0}}
.bar.team i{background:repeating-linear-gradient(-55deg, rgba(255,255,255,.18) 0 5px, transparent 5px 12px), var(--grad-team);background-size:24px 100%, 100% 100%}
.bar.green i{background:repeating-linear-gradient(-55deg, rgba(255,255,255,.18) 0 5px, transparent 5px 12px), linear-gradient(115deg,#43D98A,#1F9457);background-size:24px 100%, 100% 100%}
.bar.red i{background:repeating-linear-gradient(-55deg, rgba(255,255,255,.18) 0 5px, transparent 5px 12px), linear-gradient(115deg,#F2764C,#C4401C);background-size:24px 100%, 100% 100%}

/* score bug — broadcast style */
.scorebug{display:flex;align-items:center;gap:8px;padding:9px 13px;position:relative;
  background:linear-gradient(90deg,#04050A,#0E1120 55%,#04050A);
  border:1px solid var(--line);border-left:5px solid var(--team);
  clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,0 100%);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
.scorebug .tm{display:flex;align-items:center;gap:6px;font-family:var(--score);font-weight:700;font-size:14px}
.scorebug .pt{font-family:var(--display);font-weight:800;font-size:22px;color:var(--gold);font-style:italic;text-shadow:2px 2px 0 rgba(0,0,0,.5)}
.scorebug .clk{margin-left:auto;text-align:right}
.scorebug .clk b{font-family:var(--score);font-size:11.5px;color:#fff;display:block;letter-spacing:1px}
.scorebug .clk span{font-size:8.5px;color:var(--gold);letter-spacing:1.5px;font-weight:700}
.dot{width:8px;height:8px;border-radius:50%;flex:none}

/* stats — jumbotron tiles */
.stat3{display:flex;gap:9px;margin:0 18px 11px}
.stat3 .st{flex:1;background:linear-gradient(170deg,#1B1E30,#13141F);border:1px solid var(--line);padding:12px 8px;text-align:center;
  clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,0 100%);position:relative;box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}
.stat3 .st::before{content:"";position:absolute;top:0;left:0;width:38%;height:3px;background:var(--grad-gold)}
.stat3 .v{font-family:var(--display);font-size:27px;font-weight:800;color:var(--gold);font-style:italic;text-shadow:2px 2px 0 rgba(0,0,0,.45)}
.stat3 .l{font-family:var(--score);font-size:8.5px;color:var(--mut);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px;font-weight:600}

/* medals — trophy plates */
.medals{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:4px 18px}
.medal{background:linear-gradient(170deg,#1B1E30,#13141F);border:1px solid var(--line);padding:13px 6px;text-align:center;cursor:pointer;
  clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,0 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}
.medal .ring{width:58px;height:58px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;
  font-size:22px;position:relative;background:radial-gradient(circle at 35% 30%, #262a40, #12131d 70%);
  box-shadow:0 0 16px -4px rgba(245,180,0,.25), inset 0 2px 3px rgba(255,255,255,.08)}
.medal .t{font-family:var(--score);font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.medal .s{font-size:8.5px;color:var(--mut);margin-top:2px}
.medal.locked{opacity:.38;filter:grayscale(.8)}

/* chat */
.msg{display:flex;gap:9px;padding:7px 18px;align-items:flex-start}
.msg .b{background:var(--surface);border:1px solid var(--line);border-radius:4px 14px 14px 14px;padding:8px 11px;font-size:12px;max-width:265px;line-height:1.4}
.msg .u{font-size:10px;font-weight:700;margin-bottom:2px}
.msg.obj .b{border-color:var(--gold);background:rgba(245,180,0,.07)}
.composer{position:absolute;left:0;right:0;bottom:86px;display:flex;gap:8px;padding:10px 18px;background:linear-gradient(transparent,var(--bg) 30%)}
.composer input{flex:1;background:var(--surface2);border:1px solid var(--line);border-radius:999px;padding:11px 16px;color:#fff;font-size:12.5px;outline:none;font-family:var(--body)}
.composer .send{width:42px;height:42px;border-radius:50%;background:var(--team);border:none;color:var(--on-team);font-size:15px;cursor:pointer;flex:none}

/* tab bar — gamified */
.tabbar{position:absolute;left:0;right:0;bottom:0;height:82px;background:linear-gradient(180deg,rgba(9,10,16,.92),#07080D 40%);
  backdrop-filter:blur(8px);border-top:1px solid var(--line);display:flex;z-index:50;padding-bottom:14px}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;color:var(--dim);position:relative}
.tab .i{font-size:20px;line-height:1;transition:transform .15s, filter .15s}
.tab .l{font-family:var(--score);font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase}
.tab.on{color:var(--gold)}
.tab.on::before{content:"";position:absolute;top:0;width:36px;height:4px;background:var(--grad-gold);transform:skewX(-20deg);box-shadow:0 0 12px rgba(245,180,0,.6)}
.tab.on .i{transform:translateY(-2px) scale(1.18);filter:drop-shadow(0 0 8px rgba(245,180,0,.55))}
.tab.on .l{color:var(--gold)}

/* live pill */
.livepill{position:absolute;top:52px;left:50%;transform:translateX(-50%) skewX(-8deg);z-index:45;display:flex;align-items:center;gap:7px;
  background:linear-gradient(90deg,#1A0505,#000 40%);border:1px solid var(--live);padding:7px 14px;cursor:pointer;
  box-shadow:0 4px 18px rgba(255,59,48,.35), 2px 2px 0 rgba(0,0,0,.5)}
.livepill .pulse{width:7px;height:7px;border-radius:50%;background:var(--live);animation:pul 1.2s infinite}
@keyframes pul{50%{opacity:.3}}
.livepill b{font-family:var(--score);font-size:11px;letter-spacing:.5px}

/* toast + sheet + confetti */
.toast{position:absolute;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);
  border:1px solid var(--gold);color:#fff;font-size:12px;font-weight:600;padding:10px 18px;border-radius:999px;opacity:0;
  transition:.25s;z-index:70;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.sheet-mask{position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:65;opacity:0;pointer-events:none;transition:.2s}
.sheet-mask.show{opacity:1;pointer-events:auto}
.sheet{position:absolute;left:0;right:0;bottom:0;background:var(--surface2);border-radius:22px 22px 0 0;z-index:66;
  transform:translateY(105%);transition:.28s cubic-bezier(.3,.9,.3,1);padding:14px 18px 30px;max-height:70%;overflow-y:auto}
.sheet.show{transform:none}
.sheet .grab{width:40px;height:4px;border-radius:99px;background:var(--line);margin:0 auto 12px}
.celebrate{position:absolute;inset:0;z-index:80;display:none;align-items:center;justify-content:center;flex-direction:column;
  background:
    repeating-conic-gradient(from 8deg at 50% 38%, rgba(245,180,0,.06) 0 9deg, transparent 9deg 24deg),
    radial-gradient(90% 60% at 50% 35%, var(--team-glow), transparent 65%),
    rgba(6,6,10,.93);
  text-align:center;padding:40px}
.celebrate.show{display:flex}
.celebrate .big{font-size:74px;animation:pop .5s cubic-bezier(.2,1.6,.4,1);filter:drop-shadow(0 0 24px rgba(245,180,0,.5))}
@keyframes pop{from{transform:scale(.2);opacity:0}}
.celebrate h2{font-family:var(--display);font-size:32px;font-weight:800;font-style:italic;text-transform:uppercase;color:var(--gold);margin-top:12px;
  text-shadow:3px 3px 0 rgba(0,0,0,.55);letter-spacing:.5px}
.celebrate p{font-size:12.5px;color:#C9CFDD;margin-top:10px;max-width:270px;line-height:1.55}
canvas#confetti{position:absolute;inset:0;z-index:81;pointer-events:none}
.celebrate .btn{margin-top:22px;z-index:82}

/* quick sync bar */
.syncbar{position:absolute;left:14px;right:14px;bottom:92px;z-index:48;display:flex;align-items:center;gap:9px;
  background:linear-gradient(90deg,#1F1A08,#171303);border:1px solid var(--gold);padding:11px 15px;cursor:pointer;
  transform:skewX(-4deg);box-shadow:0 6px 22px rgba(0,0,0,.6), 0 0 22px -6px rgba(245,180,0,.45)}
.syncbar b{font-family:var(--score);font-size:11px;letter-spacing:1px;color:var(--gold)}
.syncbar span{font-family:var(--score);font-size:11px;color:var(--gold2)}

/* misc */
.sec{display:inline-block;font-family:var(--score);font-size:10.5px;font-weight:700;letter-spacing:2.5px;color:#fff;text-transform:uppercase;
  margin:12px 18px 8px;padding:5px 15px;background:var(--grad-team);transform:skewX(-8deg);box-shadow:2px 2px 0 rgba(0,0,0,.45)}
.timer{font-family:var(--display);font-weight:800;font-style:italic;font-size:15px}
.timer.hot{color:var(--red);text-shadow:0 0 12px rgba(228,87,46,.5);animation:pul 1.2s infinite}
.ovr{width:46px;height:58px;background:linear-gradient(155deg,#2A2418,#171308 60%,#241E10);border:1px solid rgba(245,180,0,.5);
  display:flex;flex-direction:column;align-items:center;justify-content:center;flex:none;position:relative;
  clip-path:polygon(0 0,calc(100% - 9px) 0,100% 9px,100% 100%,0 100%);box-shadow:inset 0 1px 0 rgba(255,216,102,.25), 0 0 14px -4px rgba(245,180,0,.4)}
.ovr::after{content:"";position:absolute;inset:0;background:linear-gradient(110deg,transparent 40%,rgba(255,216,102,.15) 50%,transparent 60%);
  background-size:240% 100%;animation:sheen 2.8s ease-in-out infinite;pointer-events:none}
.ovr b{font-family:var(--display);font-size:19px;font-weight:800;font-style:italic;color:var(--gold2);text-shadow:1px 1px 0 rgba(0,0,0,.6)}
.ovr span{font-size:7.5px;color:var(--mut);letter-spacing:1px;font-weight:700}
.stars{color:var(--gold);font-size:11px;letter-spacing:1px}
.flag{font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;letter-spacing:.5px}
.checkrow{display:flex;align-items:center;gap:9px;padding:8px 0;font-size:12px;border-bottom:1px dashed var(--line)}
.checkrow:last-child{border:none}
.ck{width:20px;height:20px;border-radius:50%;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:11px;flex:none}
.ck.done{background:var(--green);border-color:var(--green)}
.storycard{position:absolute;inset:0;display:none;flex-direction:column;justify-content:center;padding:40px 30px;cursor:pointer}
.storycard.on{display:flex}
/* ============ MOBILE DEPLOY (auto-scale, safe areas) ============ */
@media (max-width:768px), (pointer:coarse) and (max-width:1024px){
  .stage{padding:0;gap:0}
  .side{display:none}
  .phone{width:100vw;height:100dvh;max-height:none;border-radius:0;box-shadow:none}
  .notch{display:none}
  .status{display:none}
  .screen{padding-top:calc(env(safe-area-inset-top, 0px) + 10px);
    padding-bottom:calc(96px + env(safe-area-inset-bottom, 0px))}
  .tabbar{height:auto;padding-top:6px;padding-bottom:calc(12px + env(safe-area-inset-bottom, 0px))}
  .tab{padding:6px 0 2px}
  .livepill{top:calc(env(safe-area-inset-top, 0px) + 10px)}
  .composer{bottom:calc(88px + env(safe-area-inset-bottom, 0px))}
  .toast{bottom:calc(104px + env(safe-area-inset-bottom, 0px))}
  .syncbar{bottom:calc(96px + env(safe-area-inset-bottom, 0px))}
  .hero h2{font-size:clamp(30px, 10.5vw, 44px)}
  .celebrate h2{font-size:clamp(24px, 8.5vw, 34px)}
  .stat3 .v{font-size:clamp(20px, 7vw, 28px)}
  .btn{font-size:clamp(12.5px, 3.8vw, 15px)}
}
@media (min-width:769px) and (max-width:1100px){
  .side{width:200px}
}
@media (pointer:coarse) and (min-width:520px) and (max-width:768px){
  #screens .screen>*, .tabbar{max-width:520px;margin-left:auto;margin-right:auto}
}
@media (display-mode: standalone){
  body{background:var(--bg)}
}
</style>

<body>
<div class="stage">
  <div class="side">
    <h1>CFB SUPER APP</h1>
    <div class="sub">Clickable UX prototype · v3 (five layers, CFB 28 target) · Liquidnitro × EA · Every section is navigable inside the phone. Layer 5 "Connected" is demoed via Settings → Access Model demo controls.</div>
    <div id="map"></div>
  </div>
  <div class="phone">
    <div class="notch"></div>
    <div class="status"><span id="clock">9:41</span><span class="r">5G · 100%</span></div>
    <div class="livepill" id="livepill" onclick="go('matchday')" style="display:none">
      <div class="pulse"></div><b>LIVE · OSU 21 – MICH 17 · Q3</b>
    </div>
    <div id="screens"><!--SCREENS--></div>
    <div class="tabbar" id="tabbar"></div>
    <div class="syncbar" id="syncbar" onclick="quickSync()" style="display:none"></div>
    <div class="toast" id="toast"></div>
    <div class="sheet-mask" id="sheetMask" onclick="closeSheet()"></div>
    <div class="sheet" id="sheet"></div>
    <div class="celebrate" id="celebrate">
      <canvas id="confetti"></canvas>
      <div class="big" id="celebEmoji">🏆</div>
      <h2 id="celebTitle"></h2>
      <p id="celebText"></p>
      <button class="btn gold inline" onclick="hideCeleb()">LET'S GO</button>
    </div>
  </div>
</div>
<script>
/* ================= STATE ================= */
const S = {
  streak: 9, claimed: false, coins: 182400, points: 3120,
  hours: 23, hoursMax: 35, vauxHours: 8,
  picks: {}, pickCount: 6, poll: null, bid: 47500, outbid: true,
  checkedIn: false, gamesAttended: 47, wl: '33–14',
  giftsSent: {}, ready: false, theme: 'osu',
  /* access model */
  tier: 2,            // 0 = open, 1 = EA account, 2 = owns game
  persona: 'ps5',     // active persona; entitlement is per persona
  presence: false,    // console session live → Live Companion Mode
  drafts: 0, draftAreas: [], lastSync: null, lockerN: 12,
};
const PERSONAS = {
  ps5:  { label:'PS5 · Coach Arun',  badge:'PS5',  owns:true,  snap:'Dynasty S4 W13 · CUT 89 OVR · 2 leagues' },
  pc:   { label:'PC · Coach Arun',   badge:'PC',   owns:false, snap:'No game on this platform — Tier 1 seat' },
  xbox: { label:'Xbox · Coach Arun', badge:'XBOX', owns:false, legacy:true, snap:'Owned CFB 27 · 13–1 legacy dynasty · Wrapped saved' },
};
/* effective tier for game-state features = account tier capped by persona entitlement */
function mTier(){ return PERSONAS[S.persona].owns ? S.tier : Math.min(S.tier, 1); }
const THEMES = {
  osu:   { name:'Ohio State',  abbr:'OSU', team:'#C9302C', dk:'#8E1F1C', t2:'#B0B7C3', on:'#FFFFFF' },
  mich:  { name:'Michigan',    abbr:'MICH',team:'#1B4B8F', dk:'#00274C', t2:'#FFCB05', on:'#FFFFFF' },
  texas: { name:'Texas',       abbr:'TEX', team:'#BF5700', dk:'#8C3F00', t2:'#E8E2D6', on:'#FFFFFF' },
  uga:   { name:'Georgia',     abbr:'UGA', team:'#BA0C2F', dk:'#7E0820', t2:'#C9CCD1', on:'#FFFFFF' },
};
function setTheme(k){
  S.theme = k; const t = THEMES[k], r = document.documentElement.style;
  r.setProperty('--team', t.team); r.setProperty('--team-dk', t.dk);
  r.setProperty('--team2', t.t2); r.setProperty('--on-team', t.on);
  r.setProperty('--team-glow', t.team + '59');
  toast('Theme: ' + t.name);
  if (cur === 'settings') render('settings');
}

/* ================= HELPERS ================= */
const av = (txt, col, cls) => '<div class="av ' + (cls||'') + '" style="background:' + col + '">' + txt + '</div>';
const bar = (pct, cls) => '<div class="bar ' + (cls||'') + '"><i style="width:' + pct + '%"></i></div>';
const stars = n => '<span class="stars">' + '★'.repeat(n) + '<span style="opacity:.25">' + '★'.repeat(5-n) + '</span></span>';
function bug(a, as, b, bs, clock, label){
  return '<div class="scorebug"><div class="tm">' + av(a,'var(--team)','sm') + ' <span class="pt">' + as + '</span></div>' +
  '<div style="color:var(--dim);font-size:10px">—</div>' +
  '<div class="tm"><span class="pt">' + bs + '</span> ' + av(b,'#1B4B8F','sm') + '</div>' +
  '<div class="clk"><b>' + clock + '</b><span>' + label + '</span></div></div>';
}
function hub(kick, title, sub){
  return '<div class="hero"><div class="kick">' + kick + '</div><h2>' + title + '</h2>' +
    (sub ? '<div class="sub">' + sub + '</div>' : '') +
    '<div class="pennants">' + '<i></i>'.repeat(12) + '</div></div>';
}
function subhdr(backTo, title, sub){
  return '<div class="subhdr"><div class="back" onclick="back()">‹</div><div><div class="t">' + title +
    '</div><div class="s">' + (sub||'') + '</div></div></div>';
}
function card(opts){
  return '<div class="card ' + (opts.cls||'') + (opts.go ? ' tap' : '') + '" ' +
    (opts.go ? 'onclick="go(\'' + opts.go + '\')"' : '') + '>' +
    (opts.k ? '<div class="k ' + (opts.kc||'') + '">' + opts.k + '</div>' : '') +
    (opts.t ? '<h3>' + opts.t + '</h3>' : '') +
    (opts.p ? '<p>' + opts.p + '</p>' : '') + (opts.body||'') +
    (opts.go ? '<div class="arrow">›</div>' : '') + '</div>';
}

/* ---------- access-model helpers ---------- */
function personaChip(){
  const p = PERSONAS[S.persona];
  return '<span class="chip" style="margin-top:10px" onclick="openPersonas()">🎮 ' + p.badge + ' · ' +
    (p.owns ? 'ENTITLED' : 'NO GAME') + ' ▾</span>';
}
function liveBanner(){
  if (!S.presence) return '';
  return '<div class="card field" style="padding:11px 14px"><div class="k gold">LIVE COMPANION MODE</div>' +
    '<p style="margin-top:4px;color:#D9F2E4">Your PS5 session is live. Edits stage as drafts — Quick Sync applies them between plays. Non-urgent alerts muted.</p></div>';
}
function gateScreen(id, need){
  const sc = SCREENS[id];
  const head = subhdr('home', sc.label.split('·').pop().trim(), need === 1 ? 'Free with an EA account' : 'Connects to your game');
  if (need === 1) return head +
    card({cls:'hi', k:'SIGN IN TO JOIN THE FANBASE', kc:'gold', t:'This is the fan layer — free, no game required',
      p:'Team flair, check-ins, your Fan Ledger, chapters, pick’em, streaks and the Fan Pass free track. One EA ID, everywhere.'}) +
    '<button class="btn gold" onclick="setTier(1)">SIGN IN WITH EA ID · FREE</button>' +
    card({k:'WHY IT\'S OPEN', p:'Identity and community are never paywalled. Only features that touch game state need the game.'});
  const p = PERSONAS[S.persona];
  const winback = p.legacy ? card({cls:'hi', k:'WELCOME BACK, COACH', kc:'gold', t:'You ran a 13–1 dynasty in CFB 27',
      p:'Your Wrapped, your Fan Ledger and your records carried over — they\'re waiting to continue in CFB 28. Upgrade offer: launch bundle + your Locker (' + S.lockerN + ' items) opens day one.'}) : '';
  const spectate = id === 'league'
    ? card({k:'SPECTATE MODE 👁', kc:'gold', t:'Big Ten Boys · 9 of 12 ready', p:'You can watch Dev\'s league live — ready status, standings, the drama. Acting in it needs the game.'})
    : id === 'market'
    ? card({k:'SPECTATE MODE 👁', kc:'gold', t:'CUT price trends · view only', p:'96 OVR QBs ▼18% this week. Watch the market move; bidding needs the game on this persona.'})
    : card({k:'PREVIEW 👁', kc:'gold', t:'Watch-only until this persona owns CFB 28', p:'Everything here reads and writes real game state — recruiting boards, depth charts, live auctions.'});
  return head + winback + spectate +
    card({cls:'hi', k:'YOUR LOCKER IS FILLING', kc:'team', t: S.lockerN + ' earned items are waiting in CFB 28',
      p:'Check-in drops, chapter war prizes, pick’em rewards — banked, never lost. They unlock in-game the moment you own it.'}) +
    '<button class="btn" onclick="setTier(2)">START EA PLAY TRIAL · PLAYS IN MINUTES</button>' +
    '<button class="btn gold" onclick="setTier(2);toast(\'Webstore ↗ · Locker opens on first launch\')">BUY CFB 28 · OPENS YOUR LOCKER (' + S.lockerN + ')</button>' +
    card({k:'THE LEGIBLE GATE RULE', p:'Own CFB 28 on this persona → this tab lights up. No hidden checks, no silent failures — the condition is always on the button.'});
}
function setTier(n){ S.tier = n; toast(n === 1 ? 'Signed in — welcome to the fanbase' : n === 2 ? 'Entitlement verified ✓ — everything lights up' : 'Signed out'); go(cur, true); }
function markDraft(area){
  S.drafts++; if (!S.draftAreas.includes(area)) S.draftAreas.push(area);
  updateSyncbar(); toast('Staged as draft — Quick Sync when ready');
}
function quickSync(){
  if (!S.drafts) return;
  const n = S.drafts, t = new Date().toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
  S.drafts = 0; S.draftAreas = []; S.lastSync = t; updateSyncbar();
  celeb('🔄','SYNCED TO YOUR PS5', n + ' change' + (n>1?'s':'') + ' applied as one atomic batch · ' + t + '. Your console menus just refreshed.');
}
function updateSyncbar(){
  const el = document.getElementById('syncbar');
  if (!S.drafts){ el.style.display = 'none'; return; }
  el.style.display = 'flex';
  el.innerHTML = '<span class="pulse" style="width:8px;height:8px;border-radius:50%;background:var(--gold);animation:pul 1.2s infinite"></span>' +
    '<b>' + S.drafts + ' UNSYNCED · ' + S.draftAreas.join(' + ').toUpperCase() + '</b><span style="margin-left:auto;font-weight:800">QUICK SYNC ⟶</span>';
}
function openPersonas(){
  openSheet('<div class="sec" style="padding:0 0 8px;margin:0 0 8px">WHICH COACH ARE YOU TODAY?</div>' +
    Object.entries(PERSONAS).map(([k,p]) =>
    '<div class="card' + (S.persona===k?' hi':'') + '" style="margin:0 0 10px;cursor:pointer" onclick="setPersona(\'' + k + '\')">' +
    '<div class="k ' + (p.owns?'green':p.legacy?'gold':'') + '">' + p.badge + ' · ' + (p.owns ? 'CFB 28 ENTITLED' : p.legacy ? 'OWNED CFB 27 — WIN-BACK' : 'NO GAME — TIER 1') + (S.persona===k?' · ACTIVE':'') + '</div>' +
    '<h3>' + p.label + '</h3><p>' + p.snap + '</p></div>').join('') +
    '<p style="font-size:10.5px;color:var(--mut)">Fan layer (ledger, chapters, streaks) follows your account everywhere. Game state follows the persona.</p>');
}
function setPersona(k){ S.persona = k; closeSheet(); toast('Active persona: ' + PERSONAS[k].label); go(cur, true); }
function togglePresence(){
  S.presence = !S.presence;
  if (S.presence){ toast('PS5 session detected — Live Companion Mode'); }
  else { celeb('🎬','SESSION RECAP READY','OSU 28 – MICH 17 · 342 pass yds · recap card auto-generated the moment you put the controller down. One tap to share.'); }
  go(cur, true);
}

/* ================= SCREENS ================= */
const SCREENS = {};
const G = { home:'home', dynasty:'dynasty', cut:'cut', social:'social', you:'you' };

/* ---------- HOME ---------- */
SCREENS.home = { group:'home', label:'Home · Action Feed', html: () => {
  const t = THEMES[S.theme];
  return hub('SATURDAY · NOV 28 · RIVALRY WEEK', 'GAMEDAY, COACH', 'Ohio State Buckeyes · Chapter #214 · <b style="color:var(--gold)">🔥 ' + S.streak + '-week streak</b>')
  + card({cls:'hi tap', k:'YOUR DYNASTY · WEEK 13 · ADVANCE LOCKED', kc:'team', go:'league',
      t:'4 of 12 coaches ready — league is waiting',
      p:'The Game is on the line in your save too. Tap to see who\'s holding it up.'})
  + card({k: S.claimed ? 'DAILY CLAIM · DONE FOR TODAY' : 'DAILY CLAIM · RIVALRY WEEK', kc:'gold',
      t: S.claimed ? 'Rivalry Pack claimed ✓' : 'Rivalry Pack is waiting',
      body:'<button class="btn gold inline" style="margin-top:9px" ' + (S.claimed?'disabled':'') +
      ' onclick="claimDaily(event)">' + (S.claimed ? 'CLAIMED' : 'CLAIM · KEEP THE STREAK') + '</button>'})
  + card({cls:'tap', k:'PICK’EM · CLOSES SAT 12:00', kc:'green', go:'pickem',
      t: S.pickCount + ' of 10 picked', p:'Your chapter is 2nd in fanbase picks. Finish your slate.'})
  + card({cls:'tap', k:'RECRUITING · ' + S.hours + ' HRS LEFT THIS WEEK', go:'recruiting',
      t:'5★ QB Marcus Vaux — visit unscheduled', body:'<div style="margin-top:8px">' + bar(62,'green') + '</div>'})
  + card({cls:'tap', k:'CUT AUCTION · ENDS SOON', kc:'red', go:'cardd',
      t: S.outbid ? 'You\'ve been outbid — 94 OVR J. Smith' : 'You lead — 94 OVR J. Smith',
      p:'One tap to rebid before the timer runs out.'})
  + card({cls:'tap field', k:'MATCHDAY ROOM · LIVE NOW', kc:'gold', go:'matchday',
      t:'The Game: OSU vs Michigan', p:'41,208 fans in the room · polls, hype drops, trash talk'})
  + card({k:'CAMPUS WIRE', t:'CFP rankings drop tonight · 7:00 ET',
      p:'Your dynasty\'s reveal mirrors the real one — Tuesday tradition.'});
}};

/* ---------- DYNASTY HUB ---------- */
SCREENS.dynasty = { group:'dynasty', label:'Dynasty · Hub', html: () =>
  hub('DYNASTY · SEASON 4 · WEEK 13', 'YOUR PROGRAM', 'Ohio State · 11–0 · #2 CFP · Coach Lv 47' + '<br>' + personaChip())
  + liveBanner()
  + '<div class="stat3"><div class="st"><div class="v">11–0</div><div class="l">Record</div></div>' +
    '<div class="st"><div class="v">#2</div><div class="l">CFP Rank</div></div>' +
    '<div class="st"><div class="v">#1</div><div class="l">Class of ’31</div></div></div>'
  + card({cls:'hi', k:'THIS WEEK', kc:'team', t:'vs Michigan (10–1) · The Game',
      body:'<div style="margin-top:9px">' + bug('OSU','—','M','—','SAT 12:00','NOON KICK') + '</div>'})
  + card({cls:'tap', go:'recruiting', k:'RECRUITING HUB', t:'12 on board · ' + S.hours + ' hrs left', p:'Board, offers, visits, hours — the whole weekly loop.'})
  + card({cls:'tap', go:'portal', k:'TRANSFER PORTAL', t:'34 targets tracked', p:'Windows, dealbreakers, portal alerts.'})
  + card({cls:'tap', go:'depth', k:'DEPTH CHART', t:'2 position battles flagged', p:'Fix your two-deep without booting the console.'})
  + card({cls:'tap', go:'league', k:'ONLINE LEAGUE', t:'Big Ten Boys · 9 of 12 ready', p:'Ready status, chat, commissioner tools.'})
  + card({cls:'tap', go:'history', k:'PROGRAM HISTORY', t:'Records, trophies & 30-year timeline', p:'The memory the console forgets — kept forever here.'})
};

/* ---------- RECRUITING ---------- */
const RECRUITS = [
  { id:'vaux', pos:'QB', name:'Marcus Vaux', st:5, meta:'TX · Gunslinger · #1 at pos', pct:85, lead:'Visit ready', c:'green' },
  { id:'col', pos:'EDGE', name:'Dre Colston', st:4, meta:'OH · Speed rusher', pct:62, lead:'You lead', c:'green' },
  { id:'whit', pos:'WR', name:'Tay Whitfield', st:4, meta:'GA · Deep threat', pct:44, lead:'Bama leads', c:'red' },
  { id:'brek', pos:'OT', name:'Sam Brekke', st:4, meta:'WI · Pass protect', pct:51, lead:'Close race', c:'' },
  { id:'marsh', pos:'CB', name:'J.J. Marsh', st:3, meta:'FL · Zone corner', pct:70, lead:'You lead', c:'green' },
];
SCREENS.recruiting = { group:'dynasty', label:'Dynasty · Recruiting Hub', html: () =>
  subhdr('dynasty','Recruiting Hub','Week 13 · Class of 2031')
  + '<div class="chiprow"><span class="chip on">BOARD 12</span><span class="chip" onclick="go(\'portal\')">PORTAL 34</span><span class="chip">COMMITS 8</span><span class="chip">PIPELINES</span></div>'
  + card({k:'WEEKLY HOURS', kc:'gold', body:
      '<div style="display:flex;align-items:center;gap:10px;margin-top:6px"><b style="font-family:var(--score);font-size:20px" id="hoursLeft">' + S.hours + '</b>' +
      '<div style="flex:1">' + bar(S.hours/S.hoursMax*100) + '</div><span style="font-size:10px;color:var(--mut)">of ' + S.hoursMax + '</span></div>'})
  + RECRUITS.map(r =>
    '<div class="card tap" onclick="go(\'recruit\')">' +
    '<div style="display:flex;justify-content:space-between;align-items:center"><h3 style="margin:0">' + r.pos + ' · ' + r.name + '</h3>' + stars(r.st) + '</div>' +
    '<p style="margin:2px 0 8px">' + r.meta + '</p>' +
    '<div style="display:flex;align-items:center;gap:9px"><div style="flex:1">' + bar(r.pct, r.c) + '</div>' +
    '<span style="font-size:10.5px;font-weight:700;color:var(--' + (r.c==='red'?'red':r.c==='green'?'green':'gold') + ')">' + r.lead + '</span></div></div>'
  ).join('')
  + '<button class="btn gold" onclick="readyUp(this)">SUBMIT WEEK — I\'M READY</button>'
};
SCREENS.recruit = { group:'dynasty', label:'Dynasty · Recruit Detail', html: () =>
  subhdr('recruiting','Marcus Vaux','5★ QB · Katy, TX · 6\'3" 205')
  + card({cls:'hi', k:'YOUR POSITION', kc:'team', body:
      '<div style="display:flex;align-items:center;gap:10px;margin-top:4px">' + bar(85,'green') +
      '</div><p style="margin-top:8px">You lead · Texas 2nd · Bama 3rd — <b style="color:var(--green)">85% interest</b>. Dealbreaker: <b>playing time</b> (you\'re clear).</p>'})
  + card({k:'THIS WEEK\'S HOURS ON VAUX', body:
      '<div style="display:flex;align-items:center;justify-content:center;gap:22px;margin-top:8px">' +
      '<button class="btn ghost inline" onclick="hrs(-1)">−</button>' +
      '<b id="vhours" style="font-family:var(--score);font-size:30px;color:var(--gold)">' + S.vauxHours + '</b>' +
      '<button class="btn inline" onclick="hrs(1)">+</button></div>' +
      '<p style="text-align:center;margin-top:6px">Pool left: <b id="vpool">' + S.hours + '</b> hrs</p>'})
  + card({k:'ACTIONS', body:
      '<div class="checkrow"><div class="ck done">✓</div>Send the House · in progress</div>' +
      '<div class="checkrow"><div class="ck done">✓</div>Coach visit scheduled</div>' +
      '<div class="checkrow"><div class="ck" id="visitCk"></div>Official visit — <b>The Game, Sat</b></div>'})
  + '<button class="btn" onclick="scheduleVisit(this)">SCHEDULE OFFICIAL VISIT · RIVALRY WEEK</button>'
  + card({k:'WHY THIS MATTERS', p:'Visits during marquee games get a +15% interest swing. Rivalry Week is your best shot before Signing Day.'})
};
SCREENS.portal = { group:'dynasty', label:'Dynasty · Transfer Portal', html: () =>
  subhdr('dynasty','Transfer Portal','Window opens Jan 2 · 34 tracked')
  + '<div class="chiprow"><span class="chip on">ALL</span><span class="chip">QB</span><span class="chip">EDGE</span><span class="chip">WR</span><span class="chip">FITS MY SCHEME</span></div>'
  + card({k:'PORTAL RADAR · PREDICTED ENTRIES', kc:'gold', t:'3 likely entries match your needs',
      p:'Radar watches playing-time dealbreakers league-wide and flags fits before the window opens.'})
  + [['QB Cade Morrow','Oregon St · 88 OVR · wants: starter','92% fit'],
     ['EDGE T. Ballard','Georgia · 85 OVR · wants: NIL + snaps','81% fit'],
     ['WR D. Okoye','SMU · 84 OVR · wants: contender','77% fit']].map(r =>

let cur = null; const stack = [];
const TABS = [
  ['home','🏠','Home'],['dynasty','🏈','Dynasty'],['cut','🃏','CUT'],['social','📣','Social'],['you','⭐','You']
];
function render(id){
  const host = document.getElementById('screens');
  let el = document.getElementById('sc-' + id);
  if (!el){ el = document.createElement('section'); el.className = 'screen'; el.id = 'sc-' + id; host.appendChild(el); }
  const sc = SCREENS[id];
  const need = (id === 'home' || id === 'settings') ? 0
    : (sc.group === 'dynasty' || sc.group === 'cut') ? 2
    : (sc.group === 'social' || sc.group === 'you') ? 1 : 0;
  const have = need === 2 ? mTier() : S.tier;
  el.innerHTML = (have < need) ? gateScreen(id, have < 1 ? 1 : 2) : sc.html();
}
function go(id, isBack){
  if (!SCREENS[id]) return;
  if (cur && !isBack && cur !== id) stack.push(cur);
  render(id);
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on','back-anim'));
  const el = document.getElementById('sc-' + id);
  el.classList.add('on'); if (isBack) el.classList.add('back-anim');
  el.scrollTop = 0; cur = id;
  const g = SCREENS[id].group;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.g === g));
  document.querySelectorAll('.side a').forEach(a => a.classList.toggle('on', a.dataset.id === id));
  document.getElementById('livepill').style.display = (id === 'matchday' || id === 'wrapped') ? 'none' : 'flex';
}
function back(){ const p = stack.pop() || SCREENS[cur].group; go(p === cur ? 'home' : p, true); }

/* tabs */

  '<div class="tab" data-g="' + t[0] + '" onclick="stack.length=0;go(\'' + t[0] + '\')"><div class="i">' + t[1] + '</div><div class="l">' + t[2] + '</div></div>').join('');

/* celebration + confetti */
function celeb(emoji, title, text){
  document.getElementById('celebEmoji').textContent = emoji;
  document.getElementById('celebTitle').textContent = title;
  document.getElementById('celebText').textContent = text;
  document.getElementById('celebrate').classList.add('show');
  confettiBurst();
}
function hideCeleb(){ document.getElementById('celebrate').classList.remove('show'); }
function confettiBurst(){
  const cv = document.getElementById('confetti'), ctx = cv.getContext && cv.getContext('2d');
  if (!ctx) return;
  cv.width = cv.offsetWidth; cv.height = cv.offsetHeight;
  const cols = [getComputedStyle(document.documentElement).getPropertyValue('--team'), '#F5B400', '#FFFFFF', getComputedStyle(document.documentElement).getPropertyValue('--team2')];
  const ps = Array.from({length:90},()=>({x:cv.width/2, y:cv.height*0.42, vx:(Math.random()-.5)*11, vy:-Math.random()*10-3, s:Math.random()*7+3, c:cols[Math.random()*cols.length|0], r:Math.random()*6.28}));
  let f = 0;
  (function tick(){ f++; ctx.clearRect(0,0,cv.width,cv.height);
    ps.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += .25; p.r += .1;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.r); ctx.fillStyle = p.c; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s); ctx.restore(); });
    if (f < 110) requestAnimationFrame(tick); else ctx.clearRect(0,0,cv.width,cv.height); })();
}

/* countdown timers */
setInterval(() => {
  document.querySelectorAll('.timer[data-t]').forEach(el => {
    let t = parseInt(el.dataset.t) - 1; if (t < 0) t = 0;
    el.dataset.t = t;
    const m = Math.floor(t/60), s = t%60;
    el.textContent = m + ':' + String(s).padStart(2,'0');
    if (t < 300) el.classList.add('hot');
  });
}, 1000);

document.getElementById('clock').textContent = new Date().toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}).replace(/\s?[AP]M/i,'');

  navigator.serviceWorker.register('sw.js').catch(function(){});
}
